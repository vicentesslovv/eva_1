<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blupy Flowers | Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo-container">
        <a href="index.html">               
        <img src="img/Logo.png" alt="Logo Blupy Flowers">
        </a>
    </div>
    <h2>Blupy flowers</h2>
    <nav class="nav-links">
        <a href="index.html">INICIO</a>
        <a href="galeria.html">GALERIA</a>
    </nav>
</header>

<main>
    <img src="img/imagen-principal.jpg" class="banner" alt="Jardín principal">

    <section class="login-main">
        <div class="login-box">
            <h3>Iniciar Sesión</h3>
            <p>Accede a tu panel de gestión de jardines</p>
            
            <form action="index.html" method="post">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="pedro123@gmail.com(Ejemplo)" required>
                </div>
                
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div class="remember-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Recordar contraseña en este dispositivo</label>
                </div>
                <button type="submit" class="btn-login-final">INGRESAR</button>
            </form>
        </div>
    </section>
</main>

<footer>
    DESARROLLADOR: VICENTE CAYETANO YÁÑEZ CORNEJO
</footer>

</body>
</html>
